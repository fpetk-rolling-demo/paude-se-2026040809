apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paude-se-2026040809
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fpetk-rolling-demo/paude-se-2026040809.git
    targetRevision: main
    path: ./app-of-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: rhdh-app
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
